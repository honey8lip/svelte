name: Feature Request
description: Suggest an idea or enhancement for Svelte
labels: ['feature request']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please fill out the form below.
        Before submitting, please check if there's already an existing issue or discussion for your idea.

  - type: textarea
    id: problem
    attributes:
      label: Describe the problem
      description: Is your feature request related to a problem? Please describe it clearly.
      placeholder: I'm always frustrated when...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: I would like...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: importance
    attributes:
      label: Importance
      description: How important is this feature to you? Would you be willing to submit a PR to implement it?
      placeholder: This would be very helpful because...
    validations:
      required: false

  - type: checkboxes
    id: pr
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request to implement this feature
